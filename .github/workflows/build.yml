name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Indir
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Kutuphaneleri Yukle
        run: npm install

      - name: Expo Prebuild (Android altyapisini hazirla)
        run: npx expo prebuild --platform android

      - name: APK Derleme (Gercek Uretim Surumu)
        run: |
          export NODE_OPTIONS="--max-old-space-size=3072"
          cd android
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx1536m"

      - name: APK'yi Indirilebilir Yap
        uses: actions/upload-artifact@v4
        with:
          name: SablonCizici-Hazir-APK
          path: android/app/build/outputs/apk/release/app-release.apk
